<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | NFT preview card component</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!--Main box-->
  <div class="main">
    <!--Wrapper box-->
    <div class="wrapper">
      <!--Image box-->
    <div class="image">
      <div class="view"><img src="./images/icon-view.svg" alt="view icon"></div>
    </div>
    <br>
    <!--Content section-->
    <h2>Equilibrium <a href="">#3429</a></h2> 
    <br>
    <p class="slogan">Our Equilibrium collection promotes balance and calm.</p>
    <br>
    <div class="info">

      <p class="eth"><img src="./images/icon-ethereum.svg" alt="icon-ethereum">&nbsp;&nbsp;0.041 ETH</p>
      <p class="clock"><img src="./images/icon-clock.svg" alt="icon-clock">&nbsp;&nbsp;3 days left</p>
    </div>
    <br>
    <hr>
    <br>
    <div class="creation">
      <p><img src="./images/image-avatar.png" alt="image-avatar">&nbsp;&nbsp;Creation of&nbsp;<a href="">Jules
          Wyvern</a></p>
    </div>
    </div>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Ricardo Aguilera Casabella</a>.
  </div>
</body>

</html>
